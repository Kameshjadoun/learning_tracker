<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<title>Study Tracker</title>
	<style>
		:root{--bg:#0f1724;--card:#0b1220;--accent:#7c3aed;--muted:#94a3b8;--glass:rgba(255,255,255,0.04)}
		*{box-sizing:border-box;font-family:Inter,system-ui,Segoe UI,Roboto,'Helvetica Neue',Arial}
		body{margin:0;min-height:100vh;background:linear-gradient(180deg,#071033 0%,#071022 60%),var(--bg);color:#e6eef8;display:flex;align-items:center;justify-content:center;padding:32px}
		.wrap{width:980px;max-width:98%;display:grid;grid-template-columns:1fr 360px;gap:24px}
		.card{background:linear-gradient(180deg,rgba(255,255,255,0.02),transparent),var(--card);padding:18px;border-radius:14px;box-shadow:0 6px 20px rgba(2,6,23,0.6);backdrop-filter:blur(6px)}
		header{display:flex;gap:12px;align-items:center;margin-bottom:12px}
		.logo{width:52px;height:52px;border-radius:10px;background:linear-gradient(135deg,var(--accent),#4c1d95);display:flex;align-items:center;justify-content:center;font-weight:700;color:white;font-size:18px}
		h1{margin:0;font-size:18px}
		p.lead{margin:0;color:var(--muted);font-size:13px}
		form{display:flex;gap:8px;align-items:center;margin-top:12px}
		input,select,button,textarea{background:var(--glass);border:1px solid rgba(255,255,255,0.04);color:inherit;padding:10px;border-radius:10px}
		input[type="number"]{width:110px}
		textarea{flex:1;min-height:44px;resize:vertical}
		button{background:linear-gradient(90deg,var(--accent),#5b21b6);border:none;color:white;padding:10px 14px;cursor:pointer;transition:transform .12s ease,box-shadow .12s}
		button:active{transform:scale(.98)}
		.list{margin-top:14px;display:grid;gap:10px}
		.item{display:flex;justify-content:space-between;gap:12px;align-items:center;padding:10px;border-radius:10px;background:linear-gradient(90deg,rgba(124,58,237,0.06),transparent);transform-origin:left;animation:pop .28s ease}
		.meta{display:flex;gap:10px;align-items:center}
		.hours{background:rgba(255,255,255,0.04);padding:6px 8px;border-radius:8px;color:var(--accent);font-weight:600}
		.topic{color:#dfe8ff}
		.time{color:var(--muted);font-size:12px}
		.right{display:flex;gap:8px;align-items:center}
		.small{font-size:12px;color:var(--muted)}
		.chart{height:150px;margin-top:16px;border-radius:10px;padding:12px;background:linear-gradient(180deg,rgba(255,255,255,0.02),transparent)}
		.bar{height:100%;display:flex;align-items:flex-end;gap:8px;padding:6px}
		.col{width:28px;background:linear-gradient(180deg,var(--accent),#4c1d95);border-radius:6px;display:flex;align-items:flex-end;justify-content:center;color:white;font-size:11px;padding-bottom:6px;box-shadow:0 6px 14px rgba(76,29,149,0.18);transform:translateY(20px);animation:rise .6s cubic-bezier(.2,.9,.3,1) forwards}
		@keyframes rise{to{transform:translateY(0)}}
		@keyframes pop{from{opacity:0;transform:scale(.98) translateY(6px)}to{opacity:1;transform:none}}
		.empty{color:var(--muted);padding:18px;border-radius:8px;text-align:center}
		footer{margin-top:12px;color:var(--muted);font-size:13px;text-align:center}
		.controls{display:flex;gap:8px}
		.ghost{background:transparent;border:1px solid rgba(255,255,255,0.04);color:var(--muted)}
	</style>
</head>
<body>
	<div class="wrap">
		<div class="card">
			<header>
				<div class="logo">ST</div>
				<div>
					<h1>Study Tracker</h1>
					<p class="lead">Quickly log your study hours and topics. Data is saved locally.</p>
				</div>
			</header>

			<form id="entryForm">
				<input id="topic" placeholder="Topic (e.g. Calculus, French)" required />
				<input id="hours" type="number" min="0" step="1" placeholder="Hours" />
				<input id="minutes" type="number" min="0" max="59" step="1" placeholder="Minutes" />
				<button type="submit">Add</button>
			</form>

			<div class="list" id="list"></div>

			<div class="chart card" id="chart" aria-hidden="false"></div>
			<footer>
				<div class="controls">
					<button id="clear" class="ghost">Clear all</button>
					<div class="small" id="total">Total: 0h</div>
				</div>
			</footer>
		</div>

		<div class="card">
			<h3 style="margin-top:0">Session Notes</h3>
			<textarea id="notes" placeholder="Short notes about today's study..." style="width:100%"></textarea>
			<div style="height:12px"></div>
			<div class="small">Notes auto-save.</div>
		</div>
	</div>

	<script>
		const listEl = document.getElementById('list');
		const chartEl = document.getElementById('chart');
		const totalEl = document.getElementById('total');
		const form = document.getElementById('entryForm');
		const minutesInput = document.getElementById('minutes');
		const notes = document.getElementById('notes');

		let entries = JSON.parse(localStorage.getItem('study.entries')||'[]');
		notes.value = localStorage.getItem('study.notes')||'';

		function save(){ localStorage.setItem('study.entries', JSON.stringify(entries)); }

		function render(){
			listEl.innerHTML='';
			if(!entries.length) listEl.innerHTML='<div class="empty">No entries yet — add your first study session.</div>';
			let total = 0;
			entries.slice().reverse().forEach((e,i)=>{
				total += +e.hours;
				const it = document.createElement('div'); it.className='item';
				it.innerHTML = `<div class="meta"><div class="hours">${e.hours}h</div><div><div class="topic">${escapeHtml(e.topic)}</div><div class="time">${new Date(e.t).toLocaleString()}</div></div></div><div class="right"><button data-i="${entries.length-1-i}" class="ghost">Delete</button></div>`;
				listEl.appendChild(it);
			});
			totalEl.textContent = `Total: ${total}h`;
			renderChart(entries);
		}

		function renderChart(data){
			chartEl.innerHTML='';
			if(!data.length){ chartEl.innerHTML='<div class="empty">Chart will appear here when you add entries.</div>'; return }
			// aggregate by topic
			const map = {};
			data.forEach(x=>{ map[x.topic]=(map[x.topic]||0)+(+x.hours); });
			const topics = Object.keys(map);
			const max = Math.max(...Object.values(map));
			const container = document.createElement('div'); container.className='bar';
			topics.forEach(t=>{
				const h = Math.round((map[t]/max)*120) + 20; // px height
				const col = document.createElement('div'); col.className='col'; col.style.height = h+'px'; col.title = `${t}: ${map[t]}h`;
				col.innerHTML = `<div style="writing-mode:vertical-rl;transform:rotate(180deg);font-size:11px">${map[t]}h</div>`;
				container.appendChild(col);
			});
			chartEl.appendChild(container);
		}

		function escapeHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }

		form.addEventListener('submit',e=>{
			e.preventDefault();
			const topic = document.getElementById('topic').value.trim();
			const h = parseInt(document.getElementById('hours').value) || 0;
			const m = parseInt(minutesInput.value) || 0;
			const hours = h + (m/60);
			if(!topic || (hours<=0)) return;
			entries.push({topic, hours: +hours.toFixed(2), t:Date.now()});
			save(); render(); form.reset();
		});

		listEl.addEventListener('click',e=>{
			if(e.target.tagName==='BUTTON'){
				const i = parseInt(e.target.dataset.i,10);
				if(!isNaN(i)){
					entries.splice(i,1); save(); render();
				}
			}
		});

		document.getElementById('clear').addEventListener('click',()=>{ if(confirm('Clear all entries?')){ entries=[]; save(); render(); } });

		notes.addEventListener('input',()=>{ localStorage.setItem('study.notes', notes.value); });

		// initial render
		render();
	</script>
</body>
</html>
